version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
  ngnix:
    image: nginx:latest
    container_name: ngnix
    ports:
      - "80:80"
    depends_on:
      - postgres
      - adminer
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_DB=${DB_NAME}
  celery:
    build: .
    container_name: celery
    command: celery -A config worker -l info
    volumes:
      - ./web:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      - postgres
      - redis
  redis:
    image: redis:latest
    container_name: redis
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - postgres
  celery-beat:
    build: .
    container_name: celery-beat
    command: celery -A config beat -l info
    volumes:
      - ./web:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      - postgres
      - redis
  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./web:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  db_data:
  media_data:
